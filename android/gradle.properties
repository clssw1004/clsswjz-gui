# 内存与 JVM 调优
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC -XX:MaxGCPauseMillis=200

# 缓存与并行（第二次编译大幅加速）
org.gradle.parallel=true
org.gradle.caching=true
# org.gradle.configuration-cache=true  # 与 Flutter Gradle 插件不兼容，禁用
org.gradle.daemon=true

# Android 与 Kotlin
android.useAndroidX=true
android.enableJetifier=true
android.builtInKotlin=false
android.newDsl=false
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx2G -XX:+UseG1GC
